<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FinTrace — Asynchronous Agentic GraphRAG Supply Chain Monitor. Upload supply-chain documents, build knowledge graphs, and get AI-powered risk assessments.">
    <title>{% block title %}FinTrace{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/dashboard.css' %}">

    {% block head_extra %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen antialiased">
    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
